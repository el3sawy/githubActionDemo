require "json"

# Xcode build & test summary
if File.exist?("fastlane/test_output/CIDemo.xcresult")
  xcode_summary.inline_mode = true
  xcode_summary.report "fastlane/test_output/CIDemo.xcresult"
else
  warn("xcresult not found — build or test step may have failed before producing output.")
end

# Unit test coverage
if File.exist?("coverage.json")
  coverage = JSON.parse(File.read("coverage.json"))

  markdown("## ✅ Unit Test Coverage")

  overall = coverage["lineCoverage"] * 100

  markdown("| Metric | Value |")
  markdown("|--------|-------|")
  markdown("| Overall Coverage | #{overall.round(2)}% |")
else
  warn("Coverage report not generated — tests may have failed.")
end