name: Danger

on:
  pull_request:

jobs:
  danger:
    runs-on: macos-26
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Danger JS
        run: npm install -g danger

      - name: Build Danger
        run: swift build

      - name: Run Danger
        run: swift run danger-swift ci
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
