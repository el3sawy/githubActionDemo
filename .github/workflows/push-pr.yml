on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Verify Xcode Version
        run: xcodebuild -version

      - name: Link iOS Runtime
        run: |
          xcrun simctl runtime add "com.apple.CoreSimulator.SimRuntime.iOS-26-2" || true

      - name: Resolve Simulator UDID
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c \
            "import json,sys; d=json.load(sys.stdin)['devices']; iphones=[v for key,devs in d.items() if 'iOS' in key for v in devs if 'iPhone' in v['name'] and v['isAvailable']]; print(iphones[0]['udid'])")
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "Resolved simulator UDID: $UDID"

      - name: Boot Simulator
        run: |
          xcrun simctl boot $SIMULATOR_UDID || true
          xcrun simctl bootstatus $SIMULATOR_UDID -b

      - name: Build App
        run: |
          xcodebuild \
            -project CIDemo.xcodeproj \
            -scheme CIDemo \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild \
            -project CIDemo.xcodeproj \
            -scheme CIDemo \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            clean build \
            CODE_SIGNING_ALLOWED=NO

      - name: Shutdown Simulator
        if: always()
        run: xcrun simctl shutdown $SIMULATOR_UDID || true