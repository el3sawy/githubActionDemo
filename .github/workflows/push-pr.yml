on:
 push:
    branches:
      - main
 pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: macos-26

    steps:
      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with: 
          xcode-version: '26.5'
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      
      - name: ruby version
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.1
          bundler-cache: true
      
      - name: Install Bundler
        run: bundle install
     
      - name: Run Tests
        run: bundle exec fastlane tests
          