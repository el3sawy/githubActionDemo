on:
 push:
    branches:
      - main
 pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: macos-26
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with: 
          xcode-version: '26.5'
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: ruby version
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true
      
      - name: Install Bundler
        run: bundle install
     
      - name: Run Tests
        run: bundle exec fastlane tests

      - name: Generate coverage JSON
        if: always()
        run: xcrun xccov view --report --json fastlane/test_output/CIDemo.xcresult > coverage.json

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.json

      - name: Upload xcresult artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: fastlane/test_output/CIDemo.xcresult

      - name: Install Danger JS
        if: always() && github.event_name == 'pull_request'
        run: npm install -g danger

      - name: Build Danger Swift
        if: always() && github.event_name == 'pull_request'
        run: swift build

      - name: Run Danger
        if: always() && github.event_name == 'pull_request'
        run: swift run danger-swift ci
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

