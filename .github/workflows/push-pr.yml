on:
 push:
    branches:
      - main
 pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: macos-26

    steps:
      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with: 
          xcode-version: '26.5'
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      
      - name: ruby version
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.1
          bundler-cache: true
      
      - name: Install Bundler
        run: bundle install
     
      - name: Run Tests
        run: bundle exec fastlane tests
        continue-on-error: true

      - name: Generate coverage JSON
        run: xcrun xccov view --report --json fastlane/test_output/CIDemo.xcresult > coverage.json
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.json

      - name: Upload xcresult artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: fastlane/test_output/CIDemo.xcresult

      - name: Run Danger
        if: always() && github.event_name == 'pull_request'
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bundle exec danger pr ${{ github.event.pull_request.html_url }} --dangerfile=Dangerfile.yml
